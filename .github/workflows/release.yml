name: Build Release Package

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

jobs:
  release:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: dev
      
      - name: Get latest tag and bump version
        id: version
        run: |
          # Fetch all tags from remote
          git fetch --tags
          
          LATEST=$(python3 << 'PYTHON'
          import subprocess
          tags = subprocess.check_output(['git', 'tag', '-l']).decode().strip().split('\n')
          tags = [t.lstrip('v') for t in tags if t]
          tags = [t for t in tags if t and t[0].isdigit()]
          tags.sort(key=lambda x: tuple(map(int, x.split('.'))))
          result = tags[-1] if tags else '1.0.0'
          print(result)
          PYTHON
          )
          
          # Parse version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$LATEST"
          
          # Bump version based on input
          case "${{ github.event.inputs.bump }}" in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            *)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          NEW_VERSION="${MAJOR}.${MINOR}.${PATCH}"
          echo "NEW_VERSION=${NEW_VERSION}" >> $GITHUB_OUTPUT
          echo "VERSION=${MAJOR}.${MINOR}.${PATCH}" >> $GITHUB_OUTPUT
      
      - name: Create git tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          
          TAG="${{ steps.version.outputs.NEW_VERSION }}"
          # Ensure no 'v' prefix
          TAG=${TAG#v}
          
          git tag "$TAG"
          git push origin "$TAG"
      
      - name: Set version in config
        run: |
          # Read config and update version
          python3 << 'PYTHON'
          import json
          
          with open('config.json') as f:
              config = json.load(f)
          
          config['version'] = '${{ steps.version.outputs.VERSION }}'
          
          with open('config.json', 'w') as f:
              json.dump(config, f, indent=2)
          PYTHON
      
      - name: Create package directory
        run: |
          mkdir -p hbs-${{ steps.version.outputs.VERSION }}
          
          # Copy all files from root (excluding specific ones)
          cp -r * hbs-${{ steps.version.outputs.VERSION }}/ 2>/dev/null || true
          
          # Remove excluded files
          rm -f hbs-${{ steps.version.outputs.VERSION }}/.gitignore
          rm -f hbs-${{ steps.version.outputs.VERSION }}/LICENSE
          rm -f hbs-${{ steps.version.outputs.VERSION }}/README.md
          rm -rf hbs-${{ steps.version.outputs.VERSION }}/.github
          
          chmod +x hbs-${{ steps.version.outputs.VERSION }}/install.sh
      
      - name: Create tarball
        run: tar -czf hbs-${{ steps.version.outputs.VERSION }}.tar.gz hbs-${{ steps.version.outputs.VERSION }}/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.version.outputs.NEW_VERSION }}
          files: hbs-${{ steps.version.outputs.VERSION }}.tar.gz
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}