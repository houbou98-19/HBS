<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB System - Personal Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a15 0%, #1a0f2e 100%);
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 56px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #00ff88;
            letter-spacing: 3px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #00aaff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        
        .status {
            font-size: 14px;
            color: #00ff88;
            margin-bottom: 10px;
            letter-spacing: 1px;
            min-height: 20px;
        }
        
        .status.offline {
            color: #ff4444;
            animation: blink 1s infinite;
        }

        .status.online {
            color: #00ff88;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }
        
        .recently-played {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #00ff8844;
        }
        
        .section-title {
            font-size: 14px;
            color: #00ff88;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 40px;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
            text-align: left;
        }
        
        .game-item {
            font-family: 'Courier New', monospace;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 0;
            border: none;
            background: none;
        }
        
        .game-info {
            display: flex;
            gap: 15px;
            align-items: baseline;
            flex: 1;
        }
        
        .game-name {
            color: #92f5c7;
            font-weight: bold;
            font-size: 35px;
        }
        
        .game-platform {
            color: #666;
            font-size: 13px;
        }
        
        .game-time-info {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 2px;
        }
        
        .playtime {
            color: #00aaff;
            font-size: 16px;
        }
        
        .last-played {
            color: #00aaff;
            font-size: 12px;
        }
        
        .empty-state {
            color: #666;
            font-size: 11px;
            padding: 20px;
        }
        
        .footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }
            .logo {
                font-size: 32px;
            }
            .subtitle {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HB SYSTEM</h1>
        <div class="subtitle">PERSONAL ARCADE</div>
        
        <div class="status" id="status">
            [ scan a cartridge to play ]
        </div>
        
        <div class="recently-played">
            <div class="section-title">Recently Played</div>
            <div class="game-list" id="gameList">
                <div class="empty-state">No games played yet</div>
            </div>
        </div>
    </div>
    
    <div class="footer" id="version">v1.0.0</div>
    
    <script>
        async function loadRecentlyPlayed() {
            try {
                // Check status
                const statusRes = await fetch('/api/status');
                const statusData = await statusRes.json();
                
                if (statusData.status === 'online') {
                    document.getElementById('status').className = 'status online';
                    document.getElementById('status').textContent = '[ scan a cartridge to play ]';
                } else {
                    document.getElementById('status').className = 'status offline';
                    document.getElementById('status').textContent = '[ not online ]';
                }
                
                // Load games
                const gamesRes = await fetch('/api/games');
                const gamesData = await gamesRes.json();
                const games = gamesData.games || [];
                
                // Filter games that have been played (playtime > 0 or last_played is set)
                const playedGames = games.filter(g => g.playtime > 0 || g.last_played);
                
                // Sort by last_played (newest first)
                playedGames.sort((a, b) => {
                    const dateA = a.last_played ? new Date(a.last_played) : new Date(0);
                    const dateB = b.last_played ? new Date(b.last_played) : new Date(0);
                    return dateB - dateA;
                });
                
                // Get top 5
                const topGames = playedGames.slice(0, 5);
                
                // Render games
                const gameList = document.getElementById('gameList');
                if (topGames.length === 0) {
                    gameList.innerHTML = '<div class="empty-state">No games played yet</div>';
                } else {
                    gameList.innerHTML = topGames.map(game => {
                        const lastPlayedText = game.last_played 
                            ? new Date(game.last_played).toLocaleDateString('en-US', { month: 'short', day: 'numeric' })
                            : 'Never';
                        return `
                            <div class="game-item">
                                <div class="game-info">
                                    <div class="game-header">
                                        <span class="game-name">${game.name}</span>
                                        <span class="game-platform">${game.platform}</span>
                                    </div>
                                </div>
                                <div class="game-time-info">
                                    <div class="playtime">⏱ ${formatPlaytime(game.playtime)}</div>
                                    <div class="last-played">${lastPlayedText}</div>
                                </div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (e) {
                console.error('Error loading games:', e);
                document.getElementById('status').className = 'status offline';
                document.getElementById('status').textContent = '[ offline ]';
            }
        }
        
        function formatPlaytime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }
        
        // Load on page load
        loadRecentlyPlayed();
    </script>
</body>
</html>
