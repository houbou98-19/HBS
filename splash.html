<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HB System - Personal Arcade</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0a15 0%, #1a0f2e 100%);
            color: #00ff88;
            font-family: 'Press Start 2P', monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 40px;
            overflow: hidden;
        }
        
        .container {
            text-align: center;
            max-width: 900px;
            width: 100%;
        }
        
        .logo {
            font-size: 48px;
            margin-bottom: 20px;
        }
        
        h1 {
            font-size: 56px;
            margin-bottom: 5px;
            text-shadow: 0 0 20px #00ff88;
            letter-spacing: 3px;
        }
        
        .subtitle {
            font-size: 18px;
            color: #00aaff;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        
        .status {
            font-size: 14px;
            color: #00ff88;
            margin-bottom: 10px;
            letter-spacing: 1px;
            min-height: 20px;
        }
        
        .status.offline {
            color: #ff4444;
            animation: blink 1s infinite;
        }

        .status.online {
            color: #00ff88;
            animation: blink 1s infinite;
        }
        
        @keyframes blink {
            0%, 49%, 100% { opacity: 1; }
            50%, 99% { opacity: 0.3; }
        }
        
        .recently-played {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #00ff8844;
        }
        
        .section-title {
            font-size: 14px;
            color: #00ff88;
            margin-bottom: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .game-list {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 40px;
        }
        
        .game-item {
            background: #0d0d1a;
            border: 1px solid #00ff8844;
            padding: 15px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            line-height: 1.6;
        }
        
        .game-item:hover {
            border-color: #00ff88;
            box-shadow: 0 0 10px #00ff8844;
        }
        
        .game-name {
            font-size: 12px;
            color: #00ff88;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .game-platform {
            color: #666;
            margin-bottom: 5px;
        }
        
        .game-playtime {
            color: #00aaff;
            font-size: 10px;
        }
        
        .empty-state {
            color: #666;
            font-size: 11px;
            padding: 20px;
        }
        
        .footer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 9px;
            color: #444;
            letter-spacing: 1px;
        }
        
        @media (max-width: 600px) {
            h1 {
                font-size: 32px;
            }
            .logo {
                font-size: 32px;
            }
            .subtitle {
                font-size: 14px;
            }
            .game-list {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>HB SYSTEM</h1>
        <div class="subtitle">PERSONAL ARCADE</div>
        
        <div class="status" id="status">
            [ scan a cartridge to play ]
        </div>
        
        <div class="recently-played">
            <div class="section-title">Recently Played</div>
            <div class="game-list" id="gameList">
                <div class="empty-state">No games played yet</div>
            </div>
        </div>
    </div>
    
    <div class="footer" id="version">v1.0.0</div>
    
    <script>
        async function loadRecentlyPlayed() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                if (data.status === 'online') {
                    document.getElementById('status').className = 'status online';
                    document.getElementById('status').textContent = '[ scan a cartridge to play ]';
                } else {
                    document.getElementById('status').className = 'status offline';
                    document.getElementById('status').textContent = '[ not online ]';
                }
            } catch (e) {
                document.getElementById('status').className = 'status offline';
                document.getElementById('status').textContent = '[ offline ]';
            }
        }
        
        function formatPlaytime(seconds) {
            const h = Math.floor(seconds / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            if (h > 0) return `${h}h ${m}m`;
            return `${m}m`;
        }
        
        // Load on page load
        loadRecentlyPlayed();
        // Refresh every 5 seconds
        setInterval(loadRecentlyPlayed, 5000);
    </script>
</body>
</html>
